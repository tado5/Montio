version: '3.8'

services:
  mariadb:
    image: mariadb:latest
    container_name: montio_mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: montio_dev
      MYSQL_USER: montio_user
      MYSQL_PASSWORD: montio_local_password
    ports:
      - "3307:3306"
    volumes:
      - montio_db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  montio_db_data:
